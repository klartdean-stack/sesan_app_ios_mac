workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: 1.15.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.sesan.app"

    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.cocoapods

    scripts:
      - name: Prepare Flutter
        script: |
          flutter clean
          flutter pub get
          # បង្ខំ generate files
          flutter build ios --debug --no-codesign

      - name: Pod Install
        script: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          pod install --repo-update --verbose
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - klartdean@gmail.com