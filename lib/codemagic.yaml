workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 15.4
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.sesan.app"
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.cocoapods
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS Archive
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - klartdean@gmail.com