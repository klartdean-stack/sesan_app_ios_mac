workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.0
      xcode: 16.0  # ✅ ប្រើ Xcode 16.0
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
      - name: Fix BoringSSL-GRPC
        script: |
          cd ios
          sed -i '' 's/-G//g' Pods/Target\ Support\ Files/BoringSSL-GRPC/BoringSSL-GRPC.xcconfig || true
          sed -i '' 's/-G//g' Pods/Target\ Support\ Files/gRPC-C++/gRPC-C++.xcconfig || true
          sed -i '' 's/-G//g' Pods/Target\ Support\ Files/gRPC-Core/gRPC-Core.xcconfig || true
      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com