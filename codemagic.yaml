workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 14.3.1
    scripts:
      - name: Install specific CocoaPods version
        script: |
          sudo gem uninstall cocoapods -a
          sudo gem install cocoapods -v 1.15.2
          pod --version

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Clean and Install CocoaPods
        script: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com