workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 15.4
    scripts:
      - name: Install specific CocoaPods version
        script: |
          sudo gem uninstall cocoapods -a
          sudo gem install cocoapods -v 1.15.2
          pod --version

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Clean and Install CocoaPods
        script: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Remove -G flag from Pods project
        script: |
          cd ios
          # ដក -G ចេញពីឯកសារ xcconfig ទាំងអស់
          find Pods -name "*.xcconfig" -exec perl -pi -e 's/-G //g' {} \;
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign --ios-arch=arm64
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com