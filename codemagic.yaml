workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.0
      xcode: 16.0  # ✅ ប្រើ 16.0 (តម្រូវការតិចបំផុត)
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
      - name: Patch SDWebImage
        script: |
          sed -i '' 's/isHighDynamicRange/sd_isHighDynamicRange/g' ios/Pods/SDWebImage/SDWebImage/Core/UIImage+Metadata.m || true
      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com