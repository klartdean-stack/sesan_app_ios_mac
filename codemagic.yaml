workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.24.0  # ✅ Codemagic ប្រើ 3.24.0
      xcode: 16.0
    scripts:
      - name: Flutter clean
        script: flutter clean
      - name: Get packages
        script: flutter pub get
      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
      - name: Fix BoringSSL-GRPC
        script: |
          cd ios
          find Pods/Target\ Support\ Files -name "*.xcconfig" -exec sed -i '' 's/-G//g' {} \;
          echo "✅ Fixed BoringSSL-GRPC"
      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com