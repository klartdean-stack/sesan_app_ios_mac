workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 15.4
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Clean iOS
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          cd ..

      - name: Install Pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa