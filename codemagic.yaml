workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.0
      xcode: 16.0  # ✅ ប្រើ Xcode 16.0
    scripts:
      - name: Flutter clean
        script: flutter clean

      - name: Get packages
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update

      - name: Fix BoringSSL-GRPC
        script: |
          cd ios
          # កែឯកសារ xcconfig ទាំងអស់ដែលមាន -G
          find Pods/Target\ Support\ Files -name "*.xcconfig" -exec sed -i '' 's/-G//g' {} \;
          # កែឯកសារ podspec ប្រសិនបើមាន
          find Pods -name "*.podspec" -exec sed -i '' 's/-G//g' {} \;

      - name: Patch SDWebImage
        script: |
          cd ios
          sed -i '' 's/isHighDynamicRange/sd_isHighDynamicRange/g' Pods/SDWebImage/SDWebImage/Core/UIImage+Metadata.m || true

      - name: Build iOS app
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/iphoneos/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com