workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 16.0
      cocoapods: 1.15.2
      ios_signing:
        distribution_type: app_store
        bundle_identifier: "com.sesan.app"

    scripts:
      - name: Prepare iOS
        script: |
          flutter clean
          rm -rf ios
          flutter create . --platforms=ios
          flutter pub get
          flutter pub get

      - name: Pod Install
        script: |
          cd ios
          pod install --repo-update --verbose
          cd ..

      - name: Build IPA
        script: |
          flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - klartdean@gmail.com