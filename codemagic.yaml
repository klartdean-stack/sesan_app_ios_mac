workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 14.3.1
    scripts:
      - name: Update CocoaPods
        script: |
          sudo gem install cocoapods
          pod --version

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Remove -G flag
        script: |
          cd ios
          # ដក -G ចេញពីឯកសារ xcconfig ទាំងអស់
          find Pods -name "*.xcconfig" -exec sed -i '' 's/-G //g' {} \;
          cd ..

      - name: Clean and Install CocoaPods
        script: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com