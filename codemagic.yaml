workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 15.4   # ← កំណត់ Xcode version ឲ្យច្បាស់ (ប្រើ 15.4 ឬ 16.0)
    scripts:
      - name: Update CocoaPods
        script: |
          sudo gem install cocoapods
          pod --version
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Clean and Install CocoaPods
        script: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com