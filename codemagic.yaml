workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 14.3.1
    scripts:
      - name: Install CocoaPods
        script: |
          sudo gem install cocoapods
          pod --version

      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Clean and Install CocoaPods
        script: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod repo update
          pod install --repo-update
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign \
            --target-platform=ios-arm64 \
            --no-tree-shake-icons
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com