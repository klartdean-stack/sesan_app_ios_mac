workflows:
  ios-build:
    name: iOS Build
    environment:
      flutter: stable
      xcode: 16.0   # ← ប្រើ Xcode 16.0 (មានក្នុងបញ្ជី)
    scripts:
      - name: Install Flutter dependencies
        script: |
          flutter pub get

      - name: Clean and Install CocoaPods
        script: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Remove -G flag from Pods project
        script: |
          cd ios
          find Pods -name "*.xcconfig" -exec perl -pi -e 's/-G //g' {} \;
          cd ..

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign --ios-arch=arm64
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - klartdean@gmail.com