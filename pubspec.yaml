name: my_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 📸 Image & Video
  image_picker: ^1.1.2
  video_player: ^2.9.2
  video_compress: ^3.1.4
  cached_network_image: ^3.4.0
  photo_view: ^0.15.0

  # 🔥 Firebase - USE OLDER VERSIONS (Dart 3.3.0 compatible)
  firebase_core: ^2.32.0
  firebase_auth: ^4.20.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^11.7.0
  firebase_messaging: ^14.9.0
  cloud_functions: ^4.7.0

  # app_links 7.x (ឆបគ្នានឹង Flutter 3.24.0)
  app_links: ^7.2.1
  # 🌐 Networking
  http: ^1.2.2
  dio: ^5.7.0
  url_launcher: ^6.3.1

  # 📦 Storage
  path_provider: ^2.1.4
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  gal: ^2.3.2

  # 🔐 Auth
  local_auth: ^2.3.0

  # 🎵 Audio
  audioplayers: ^6.1.0

  # 📱 UI
  provider: ^6.1.5+1
  flutter_staggered_grid_view: ^0.7.0
  flutter_staggered_animations: ^1.0.0
  audio_video_progress_bar: ^2.0.3
  fl_chart: ^0.71.0
  flutter_rating_bar: ^4.0.1
  shimmer: ^3.0.0

  # 📊 Utilities
  intl: ^0.19.0  # ✅ ប្តូរពី ^0.18.1
  get: ^4.6.6
  rxdart: ^0.28.0
  math_expressions: ^2.6.0
  screenshot: ^2.1.0
  geolocator: ^12.0.0
  file_picker: ^8.0.5
  share_plus: ^10.0.0
  record: ^4.4.4

  # 📷 Barcode & QR
  ai_barcode_scanner: ^5.1.1+2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  image_cropper: ^8.0.1

  # 🔔 Notifications
  flutter_local_notifications: ^18.0.1

  # 🌍 Localization
  flutter_localizations:
    sdk: flutter

dependency_overrides:
  app_links: 6.0.0
  video_player_avfoundation: 2.5.7
  video_player_android: 2.4.3
  video_player_platform_interface: 6.2.2
  google_mlkit_barcode_scanning: ^0.12.1
  audioplayers_darwin: 6.1.0
  intl: 0.19.0
  characters: 1.4.0
  collection: 1.19.0
  path: 1.9.0
  matcher: 0.12.17
  meta: 1.11.0
  test_api: 0.7.0
  grpc: ^3.2.0
  protobuf: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/sesan_icon.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/sesan_icon.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/sesan_logo.png.png
    - assets/sesan_banner.png.jpg
    - assets/ic_machinery.png.jpg
    - assets/ic_tools.png.jpg
    - assets/ic_seeds.png.jpg
    - assets/ic_livestock.png.jpg
    - assets/ic_fertilizer.png.jpg
    - assets/ic_vegetables.jpg
    - assets/ic_meat.png.jpg
    - assets/aba_qr.png
    - assets/ic_service.jpg
    - assets/sesan_appbar.png
    - assets/measure_guide.png
    - assets/sesan_icon.jpg
    - assets/json/cambodia_locations.json